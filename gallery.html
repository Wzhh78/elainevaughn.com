<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | THE MULTIVERSE OF ELAINE VAUGHN</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 额外样式：画廊布局与放大效果 */
        .full-gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 40px; }
        .full-gallery img { width: 100%; height: 300px; object-fit: cover; cursor: pointer; transition: transform 0.3s; }
        .full-gallery img:hover { transform: scale(1.03); }
        
        /* 模态框样式 */
        #modal { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        #modal img { max-width: 90%; max-height: 80%; }
        #modal span { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer; }
    </style>
</head>
<body>

    <nav style="margin-top: 30px;">
        <a href="index.html">← Back to Home</a>
    </nav>

    <section style="max-width: 1000px; margin: 0 auto; padding: 20px;">
        <h1>Artistic Gallery</h1>
        
        <h2>Oil Paintings</h2>
        <div class="full-gallery">
            <script>
                for(let i=1; i<=13; i++) {
                    document.write(`<img src="gallery/${i}.jpg" onclick="openModal(this.src)" alt="Oil Painting ${i}">`);
                }
            </script>
        </div>

        <h2 style="margin-top: 50px;">Jewelry Design</h2>
        <div class="full-gallery">
            <script>
                for(let i=1; i<=5; i++) {
                    document.write(`<img src="gallery/design${i}.jpg" onclick="openModal(this.src)" alt="Design ${i}">`);
                }
            </script>
        </div>
    </section>

    <div id="modal" onclick="closeModal()">
        <span onclick="closeModal()">&times;</span>
        <img id="modalImg" src="">
    </div>

    <script>
        function openModal(src) {
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('modalImg').src = src;
        }
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
    </script>
</body>
</html>
